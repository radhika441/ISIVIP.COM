<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ISI VIP</title>
<style>
body{
margin:0;
background:#0b1220;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:#111827;
padding:25px;
border-radius:15px;
width:300px;
}
input{
width:100%;
padding:8px;
margin:6px 0;
border:none;
border-radius:6px;
}
button{
width:100%;
padding:8px;
margin-top:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:#fff;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h3>ISI VIP</h3>

<label>Hari</label>
<input type="number" id="hari">

<label>Jam</label>
<input type="number" id="jam">

<label>Menit</label>
<input type="number" id="menit">

<label>ID</label>
<input type="number" id="id">
  
<button onclick="aktif()">Aktifkan VIP</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDWp9zpb16-k0S2uBxzhmOCRUnY496n1lk",
  authDomain: "panelaltiz.firebaseapp.com",
  databaseURL: "https://panelaltiz-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "panelaltiz",
  storageBucket: "panelaltiz.firebasestorage.app",
  messagingSenderId: "633869528624",
  appId: "1:633869528624:web:5525d188ac5f87f29b47f5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.aktif = function(){

  let h = parseInt(document.getElementById("hari").value) || 0;
  let j = parseInt(document.getElementById("jam").value) || 0;
  let m = parseInt(document.getElementById("menit").value) || 0;
  let id = document.getElementById("id").value;

  if(!id){
    alert("Masukkan ID!");
    return;
  }

  let total = (h*86400)+(j*3600)+(m*60);
  let end = Date.now() + total*1000;

  set(ref(db, "vipUsers/" + id), {
    vipEnd: end
  });

  alert("VIP berhasil diaktifkan untuk ID: " + id);
};

</script>

</body>
</html>
